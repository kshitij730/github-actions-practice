name: CICD

on:
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the Code
        run: echo "Cloning the code"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build Using Docker
        run: echo "Building using Docker"
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Running test cases
        run: echo "Testing the app"
  deploy:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying on machine
        run: echo "Deploying the code"
