name: ENVIRONMNET VARIABLES

on: 
  push: 

env:
  APP_NAME: myapp

jobs:
  demo:
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: staging

    steps:
    
      - name: Print Variables

        env:
          VERSION: 1.0.0

        run: |
          echo "App = $APP_NAME"
          echo "Environment = $ENVIRONMENT"
          echo "Version = $VERSION"

          echo "Commit SHA = ${{ github.sha }}"
          echo "Triggered By = ${{ github.actor }}"
