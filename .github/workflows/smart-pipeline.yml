name: Smart Pipeline

on:
  push:

jobs:

  lint:

    runs-on: ubuntu-latest

    steps:
      - run: echo "Lint Successful"

  test:

    runs-on: ubuntu-latest

    steps:
      - run: echo "Tests Passed"

  summary:

    runs-on: ubuntu-latest

    needs:
      - lint
      - test

    steps:

      - name: Branch

        run: |

          if [[ "${{ github.ref_name }}" == "main" ]]

          then
            echo "Main Branch Push"
          else
            echo "Feature Branch Push"
          fi

      - name: Commit Message

        run: |
          echo "${{ github.event.head_commit.message }}"
