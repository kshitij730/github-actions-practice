name: Deploy After Tests

on:
  workflow_run:
    workflows:
      - Run Tests
    types:
      - completed

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    steps:
      - run: echo "Deploying Application..."

  failed:
    if: github.event.workflow_run.conclusion != 'success'

    runs-on: ubuntu-latest

    steps:
      - run: echo "Tests failed. Deployment skipped."
