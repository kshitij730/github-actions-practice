name: Schedule Task

on:
  workflow_dispatch:

  schedule:
    - cron: "30 2 * * 1"
    - cron: "0 */6 * * *"

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Show Schedule
        run: |
          echo "Triggered by: ${{ github.event.schedule }}"

      - name: Health check
        run: |
          curl -I https://github.com
